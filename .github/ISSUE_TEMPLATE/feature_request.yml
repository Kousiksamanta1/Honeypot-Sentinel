name: Feature request
description: Propose a focused improvement that fits the project's authorized-use scope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or analyst problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, interface, and security considerations.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This request supports defensive, educational, or explicitly authorized security work.
          required: true

